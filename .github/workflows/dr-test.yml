name: "DR Simulation & Recovery Test"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - simulate-failure
          - restore-from-backup
          - validate-restore
      confirm:
        description: "Type CONFIRM to proceed with destructive actions"
        required: true
        type: string

  # Scheduled DR drill – every Sunday 01:00 UTC (non-destructive validate only)
  schedule:
    - cron: "0 1 * * 0"

permissions:
  id-token: write
  contents: read

env:
  PRIMARY_REGION: us-east-1
  DR_REGION: us-west-2
  DR_INSTANCE_IDENTIFIER: fincorp-dr-restored
  BACKUP_VAULT_NAME: fincorp-primary-vault
  DR_VAULT_NAME: fincorp-dr-vault

jobs:
  dr-action:
    name: "DR ${{ github.event.inputs.action || 'validate' }}"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.PRIMARY_REGION }}

      - name: Validate confirmation for destructive actions
        if: >
          github.event.inputs.action == 'simulate-failure' &&
          github.event.inputs.confirm != 'CONFIRM'
        run: |
          echo "ERROR: You must type CONFIRM to run simulate-failure"
          exit 1

      # Read primary DB identifier from SSM
      - name: Read primary DB identifier from SSM
        id: ssm-primary
        if: github.event.inputs.action == 'simulate-failure'
        run: |
          DB_ID=$(aws ssm get-parameter \
            --name "/fincorp/primary/db_identifier" \
            --query Parameter.Value --output text)
          echo "db_identifier=$DB_ID" >> "$GITHUB_OUTPUT"

      # Simulate Region Failure
      - name: Simulate region failure (delete primary DB)
        if: github.event.inputs.action == 'simulate-failure'
        run: |
          bash scripts/dr-simulate-failure.sh \
            "${{ steps.ssm-primary.outputs.db_identifier }}" \
            "${{ env.PRIMARY_REGION }}"

      # Restore from DR backup — networking values read from SSM inside the script
      - name: Restore database in DR region
        if: >
          github.event.inputs.action == 'restore-from-backup' ||
          github.event_name == 'schedule'
        run: |
          bash scripts/dr-restore.sh \
            "${{ env.DR_VAULT_NAME }}" \
            "${{ env.DR_REGION }}" \
            "${{ env.DR_INSTANCE_IDENTIFIER }}"

      # Validate restored DB
      - name: Validate DR restore
        if: >
          github.event.inputs.action == 'validate-restore' ||
          github.event_name == 'schedule'
        run: |
          bash scripts/dr-validate.sh \
            "${{ env.DR_REGION }}" \
            "${{ env.DR_INSTANCE_IDENTIFIER }}"

      # Clean up restored instance after scheduled drills or validate-restore runs
      - name: Clean up DR instance after drill
        if: >
          always() && (
            github.event_name == 'schedule' ||
            github.event.inputs.action == 'validate-restore'
          )
        run: |
          DB_STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier "${{ env.DR_INSTANCE_IDENTIFIER }}" \
            --region "${{ env.DR_REGION }}" \
            --query 'DBInstances[0].DBInstanceStatus' \
            --output text 2>/dev/null || echo "not-found")

          if [[ "$DB_STATUS" == "not-found" || "$DB_STATUS" == "None" ]]; then
            echo "DR instance not found — nothing to clean up."
            exit 0
          fi

          echo "Deleting DR instance ${{ env.DR_INSTANCE_IDENTIFIER }} (status: $DB_STATUS) ..."
          if ! aws rds delete-db-instance \
            --db-instance-identifier "${{ env.DR_INSTANCE_IDENTIFIER }}" \
            --skip-final-snapshot \
            --region "${{ env.DR_REGION }}" 2>/dev/null; then
            aws rds modify-db-instance \
              --db-instance-identifier "${{ env.DR_INSTANCE_IDENTIFIER }}" \
              --no-deletion-protection --apply-immediately \
              --region "${{ env.DR_REGION }}"
            aws rds wait db-instance-available \
              --db-instance-identifier "${{ env.DR_INSTANCE_IDENTIFIER }}" \
              --region "${{ env.DR_REGION }}"
            aws rds delete-db-instance \
              --db-instance-identifier "${{ env.DR_INSTANCE_IDENTIFIER }}" \
              --skip-final-snapshot \
              --region "${{ env.DR_REGION }}"
          fi
          echo "DR instance deleted."

      - name: Record DR test result
        if: always()
        run: |
          cat <<EOF > dr-test-result.json
          {
            "action": "${{ github.event.inputs.action || 'scheduled-validate' }}",
            "run_id": "${{ github.run_id }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "actor": "${{ github.actor }}",
            "outcome": "${{ job.status }}"
          }
          EOF

      - name: Upload DR test report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: dr-test-report-${{ github.run_number }}
          path: dr-test-result.json
