name: "FinCorp Secure CI/CD Pipeline"

on:
  push:
    branches: [main, release/**]
  pull_request:
    branches: [main]

permissions:
  id-token: write        # OIDC token for AWS and Cosign keyless signing
  contents: read
  security-events: write # Upload SARIF to GitHub Security tab

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: fincorp/artifact-service
  CODEARTIFACT_DOMAIN: fincorp
  CODEARTIFACT_DOMAIN_OWNER: ${{ secrets.AWS_ACCOUNT_ID }}
  CODEARTIFACT_REPO: fincorp-npm

jobs:
  # 0. Secret Scanning — must pass before any AWS job runs
  secret-scan:
    name: "Secret Scanning"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout (full history for secret scan)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 1. Lint & Unit Tests
  test:
    name: "Lint & Unit Tests"
    runs-on: ubuntu-22.04
    needs: secret-scan
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get CodeArtifact token
        id: ca-token
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain ${{ env.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ env.CODEARTIFACT_DOMAIN_OWNER }} \
            --query authorizationToken --output text)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

          ENDPOINT=$(aws codeartifact get-repository-endpoint \
            --domain ${{ env.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ env.CODEARTIFACT_DOMAIN_OWNER }} \
            --repository ${{ env.CODEARTIFACT_REPO }} \
            --format npm \
            --query repositoryEndpoint --output text)
          echo "npm_endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"

      - name: Configure npm to use CodeArtifact
        run: |
          ENDPOINT="${{ steps.ca-token.outputs.npm_endpoint }}"
          TOKEN="${{ steps.ca-token.outputs.token }}"
          HOST=$(echo "$ENDPOINT" | sed 's|https://||' | sed 's|/.*||')
          npm config set registry "$ENDPOINT"
          npm config set "//${HOST}/:_authToken" "$TOKEN"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Run tests with coverage
        run: npm test -- --coverageReporters=json-summary --forceExit

      - name: Upload coverage report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: coverage-report
          path: app/coverage/

  # 2. Build, Scan & Push Docker Image
  build-and-scan:
    name: "Build, Scan & Push Image"
    runs-on: ubuntu-22.04
    needs: test
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
      image_digest: ${{ steps.push.outputs.image_digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get CodeArtifact npm endpoint (for Dockerfile build-arg)
        id: ca-endpoint
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain ${{ env.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ env.CODEARTIFACT_DOMAIN_OWNER }} \
            --query authorizationToken --output text)
          echo "::add-mask::$TOKEN"

          ENDPOINT=$(aws codeartifact get-repository-endpoint \
            --domain ${{ env.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ env.CODEARTIFACT_DOMAIN_OWNER }} \
            --repository ${{ env.CODEARTIFACT_REPO }} \
            --format npm \
            --query repositoryEndpoint --output text)

          echo "npm_registry=$ENDPOINT" >> "$GITHUB_OUTPUT"
          echo "npm_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076  # v2.0.1

      - name: Set image metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "tag=v${{ github.run_number }}-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NPM_REGISTRY="${{ steps.ca-endpoint.outputs.npm_registry }}" \
            --build-arg NPM_TOKEN="${{ steps.ca-endpoint.outputs.npm_token }}" \
            --build-arg APP_VERSION="${{ steps.meta.outputs.tag }}" \
            --tag "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}" \
            --file app/Dockerfile \
            app/

      # Trivy vulnerability scan (pre-push, pinned to v0.62.1)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8  # v0.28.0
        env:
          TRIVY_IGNOREFILE: /github/workspace/.trivyignore
        with:
          image-ref: "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: false
          trivyignores: .trivyignore
          trivy-config: trivy.yaml

      - name: Upload Trivy SARIF to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@dd746615b3b9d728a6a37ca2045b68ca76d4841a  # v3.28.8
        with:
          sarif_file: trivy-results.sarif

      # Push to ECR (only after scan passes)
      - name: Push image to ECR
        id: push
        run: |
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"
          DIGEST=$(docker inspect \
            --format='{{index .RepoDigests 0}}' \
            "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}" | cut -d@ -f2)
          echo "image_uri=${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}" >> "$GITHUB_OUTPUT"
          echo "image_digest=$DIGEST" >> "$GITHUB_OUTPUT"

      # ECR enhanced scan gate
      - name: Wait for ECR image scan to complete
        run: |
          aws ecr wait image-scan-complete \
            --repository-name "${{ env.ECR_REPOSITORY }}" \
            --image-id imageTag="${{ steps.meta.outputs.tag }}" || true

      - name: Check ECR scan results for HIGH/CRITICAL
        run: |
          bash scripts/check-ecr-vulnerabilities.sh \
            "${{ env.ECR_REPOSITORY }}" \
            "${{ steps.meta.outputs.tag }}"

      # Cosign keyless signing — cryptographically ties image to this pipeline run
      - name: Install Cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a  # v3.8.1

      - name: Sign image with Cosign (keyless / OIDC)
        run: |
          cosign sign --yes \
            "${{ steps.push.outputs.image_uri }}@${{ steps.push.outputs.image_digest }}"

      - name: Save image metadata
        run: |
          cat <<EOF > image-metadata.json
          {
            "image_uri":    "${{ steps.push.outputs.image_uri }}",
            "image_digest": "${{ steps.push.outputs.image_digest }}",
            "git_sha":      "${{ github.sha }}",
            "run_number":   "${{ github.run_number }}",
            "built_at":     "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload image metadata
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: image-metadata
          path: image-metadata.json

  # 3. Generate SBOM
  sbom:
    name: "Generate SBOM"
    runs-on: ubuntu-22.04
    needs: build-and-scan

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076  # v2.0.1

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@f325611a7e9571b9cf5bf8d4e51e7c1aef96a28b  # v0.18.0
        with:
          image: ${{ needs.build-and-scan.outputs.image_uri }}
          artifact-name: sbom-${{ github.run_number }}.spdx.json
          format: spdx-json

  # 4. Terraform Plan (on pull requests only)
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269ef065  # v3.1.2
        with:
          terraform_version: "1.6.x"

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: infrastructure/terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/terraform
        run: |
          terraform plan \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan-output.txt

      - name: Upload Terraform plan
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: terraform-plan
          path: |
            infrastructure/terraform/tfplan
            infrastructure/terraform/plan-output.txt
